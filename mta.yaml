_schema-version: "3.2"
ID: sflight
version: 1.0.0
description: "CAP sflight demo"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx -p @sap/cds-dk cds build --profile production,node
modules:
  - name: sflight-srv
    type: java
    path: srv
    properties:
      SPRING_PROFILES_ACTIVE: cloud
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jre.SAPMachineJRE']"
      JBP_CONFIG_SAP_MACHINE_JRE: '{ use_offline_repository: false, version: 21.+ }'
      JBP_CONFIG_JAVA_OPTS:
        from_environment: false
        java_opts: >
          -javaagent:META-INF/.sap_java_buildpack/otel_agent/opentelemetry-javaagent.jar
          -Dotel.javaagent.extensions=META-INF/.sap_java_buildpack/otel_agent_extension/otel-agent-ext-java.jar
      OTEL_METRICS_EXPORTER: cloud-logging
      OTEL_TRACES_EXPORTER: cloud-logging
      OTEL_LOGS_EXPORTER: none
    requires:
      - name: sflight-destination
      - name: sflight-db
      - name: sflight-uaa
      - name: sflight-cloud-logging
      - name: sflight-eventmesh
      - name: sflight-connectivity
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter, destinations)
        properties:
          srv-url: ${default-url}
    parameters:
      memory: 2048M
      buildpack: sap_java_buildpack_jakarta
    build-parameters:
      builder: custom
      commands:
        - mvn --settings ../settings.xml clean package -DskipTests=true
        # - mvn clean package -DskipTests=true
      build-result: target/*-exec.jar
  - name: sflight-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: sflight-db
      - name: sflight-uaa
    build-parameters:
      ignore:
        - "node_modules/"
  - name: sflight-appcontent
    type: com.sap.application.content
    path: gen
    requires:
      - name: sflight-destination
      - name: sflight-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: sflight-app-travel-processor
          artifacts:
            - travel-processor.zip
          target-path: app/
        - name: sflight-app-travel-analytics
          artifacts:
            - travel-analytics.zip
          target-path: app/
  - name: sflight-app-travel-processor
    type: html5
    path: app/travel_processor
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm run build
      supported-platforms:
        []
  - name: sflight-app-travel-analytics
    type: html5
    path: app/travel_analytics
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm run build
      supported-platforms:
        []

resources:
  - name: sflight-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: sflight-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./app/travel_processor/xs-security.json
      config:
        xsappname: sflight-${space}
        tenant-mode: dedicated
        role-collections:
          - name: 'sflight-reviewer-${space}'
            description: Review travels
            role-template-references:
              - $XSAPPNAME.reviewer
          - name: 'sflight-processor-${space}'
            description: Process travels
            role-template-references:
              - $XSAPPNAME.processor
          - name: 'sflight-admin-${space}'
            description: Manage travels
            role-template-references:
              - $XSAPPNAME.admin
  - name: sflight-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: sflight-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: sflight-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
  - name: sflight-cloud-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: cloud-logging
      service-plan: standard
      config:
        ingest_otlp:
          enabled: true
  - name: sflight-eventmesh
    type: org.cloudfoundry.managed-service
    parameters:
      service: enterprise-messaging
      service-plan: default
  - name: sflight-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
